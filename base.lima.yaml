name: "{{VM_NAME}}"

vmType: vz

images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"

mounts:
  - location: "{{PROJECT_DIR}}"
    writable: true

portForwards:
  # App port
  - guestPort: 5173
    hostPort: 5173
    # Debugging port for Vite
  - guestPort: 9229
    hostPort: 9229
